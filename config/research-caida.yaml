profile: research-caida
schema_version: asnforge.v0.1
private_asn_policy: flag
moas_policy: mark_ambiguous
compression: true
max_mmdb_size_mb: 256
source_timeout: 120s
sources:
  rir:
    enabled: true
    urls:
      afrinic: "https://ftp.afrinic.net/pub/stats/afrinic/delegated-afrinic-extended-latest"
      apnic: "https://ftp.apnic.net/stats/apnic/delegated-apnic-extended-latest"
      arin: "https://ftp.arin.net/pub/stats/arin/delegated-arin-extended-latest"
      lacnic: "https://ftp.lacnic.net/pub/stats/lacnic/delegated-lacnic-extended-latest"
      ripe: "https://ftp.ripe.net/pub/stats/ripencc/delegated-ripencc-extended-latest"
  bgp:
    enabled: true
    mode: bgp-tools-table
    collectors:
      - bgp.tools
    urls:
      - "https://bgp.tools/table.jsonl"
  asn_catalog:
    enabled: true
    mode: bgp-tools-asns
    urls:
      - "https://bgp.tools/asns.csv"
  asn_signals:
    enabled: true
    urls:
      - "https://raw.githubusercontent.com/ipanalytics/IP-Knowledge-Layer/main/data/current/asn-signals.csv"
      - "https://raw.githubusercontent.com/ipanalytics/ASN-Signal-Graph/main/data/current/asn-signals.csv"
  caida:
    enabled: true
    # CAIDA datasets are governed by CAIDA AUA citation/reporting terms.
    # This profile uses bulk/static files only. ASRank API crawling is intentionally not used.
    asrank_urls: []
    asrank_paths: []
    as2org_urls:
      - "https://publicdata.caida.org/datasets/as-organizations/latest.as-org2info.txt.gz"
    as2org_paths: []
    # Use serial-2 by default. Do not also include serial-1 unless you intentionally
    # want to compare relationship inference versions; including both double-counts.
    relationship_urls:
      - "https://publicdata.caida.org/datasets/as-relationships/serial-2/20260501.as-rel2.txt.bz2"
    relationship_paths: []
overrides:
  path: examples/overrides.yaml
smoke:
  path: ""
